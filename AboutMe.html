<!DOCTYPE html>
<html lang="en-EN">
	<head>
		<meta charset="UTF-8">
		<title>Power Trouble</title>
		<link rel="Stylesheet" href="style.css">
		<link rel="icon" href="icon.png">
	</head>
	<body>
		<header>
			<img src="images/Logo.png" alt="Power Trouble Logo" class="logo" draggable="false">
			<nav>
				<a href ="./"><img src="images/BTN_Home.png" alt="home" class="img-btn" data-hover="images/BTN_Home_Hover.png"></a>
				<a href ="downloads"><img src="images/BTN_Downloads.png" alt="downloads" class="img-btn" data-hover="images/BTN_Downloads_Hover.png"></a>
				<a href ="extras"><img src="images/BTN_Extras.png" alt="extras" class="img-btn" data-hover="images/BTN_Extras_Hover.png"></a>
			</nav>
		</header>
		<main>
			<div class="info-box">
				<h1>About Me</h1>
				<img src="images/NickPFP.png" class="wrap">
				<p>Hi, my name is <b>Nick</b>. I'm a 19 year old programmer/artist from Poland and Angry Birds Power Trouble is one of my many passion projects. I take a general interest in art, animation and game design. I hope you enjoy my projects as much as I do.
				</p>
			</div>
		</main>
		<footer>
			<div class = "copyright">
			© 2026 NickDS
			</div>
			<div class = "buttons_r">
				<a href="FAQ">FaQ</a>
				<a href="AboutMe">About Me</a>
				<a href="https://www.youtube.com/@Nick_DoesStuff">Youtube</a>
				<a href="https://x.com/PlqKeymil">Twitter</a>
			</div>
		</footer>
		<script>
  // Select all buttons with the class 'img-btn'
  const buttons = document.querySelectorAll('.img-btn');

  buttons.forEach(btn => {
    const originalSrc = btn.src; // store original image
    const hoverSrc = btn.dataset.hover; // get hover image from data attribute

    // Mouse enters image
    btn.addEventListener('mouseover', () => {
      btn.src = hoverSrc;
    });

    // Mouse leaves image
    btn.addEventListener('mouseout', () => {
      btn.src = originalSrc;
    });
  });
</script>
	</body>
</html>
